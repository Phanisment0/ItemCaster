name: ItemCaster
version: ${version}
author: Phanisment
description: A rewrite version of ItemCaster that has same functionality, Cast skill using item.
main: ${main_class}
api-version: 1.20
depend:
- MythicMobs
softdepend:
- PlaceholderAPI
- CraftEngine
- ItemsAdder
- Oraxen
- Nexo
# libraries:
# - org.javassist:javassist:3.32.0-GA
commands:
  itemcaster:
    aliases:
    - ic
    permission: op
  itemcastermenu:
    aliases:
    - icm
    permission: op
  handcastertoggle:
    aliases:
    - hct
    permission: default